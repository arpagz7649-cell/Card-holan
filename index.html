<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD GAME HOLLAND - MAIN MENU</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .menu-box { border: 3px double #0f0; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; background: #111; }
        .btn-menu { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: #0f0; color: #000; border: none; font-weight: bold; 
            font-size: 18px; cursor: pointer; text-transform: uppercase;
        }
        .btn-menu:hover { background: #fff; transform: scale(1.05); }
        .hidden { display: none; }
        .faksi-select { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .kartu { border: 2px solid #0f0; padding: 10px; font-size: 30px; cursor: pointer; border-radius: 10px; }
        .terpilih { background: #0f0; color: #000; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 80%; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="screen-menu" class="menu-box">
        <h1>🃏 HOLLAND ARENA 🃏</h1>
        <p>-- PROJECT OON V1 --</p>
        <button class="btn-menu" onclick="showScreen('screen-select', 'single')">🕹️ SINGLE PLAYER</button>
        <button class="btn-menu" onclick="showScreen('screen-select', 'multi')">🌐 MULTIPLAYER</button>
        <button class="btn-menu" onclick="window.location.href='index.html'">🏠 KELUAR</button>
    </div>

    <div id="screen-select" class="menu-box hidden">
        <h2 id="mode-title">PILIH MODE</h2>
        <div class="faksi-select">
            <div class="kartu" onclick="pilih('♠', this)">♠</div>
            <div class="kartu" onclick="pilih('♦', this)">♦</div>
            <div class="kartu" onclick="pilih('♥', this)">♥</div>
            <div class="kartu" onclick="pilih('♣', this)">♣</div>
        </div>
        
        <div id="multiplayer-input" class="hidden">
            <input type="number" id="roomCode" placeholder="MASUKKAN KODE ROOM">
        </div>

        <button class="btn-menu" onclick="gasMain()">🚀 MULAI BATTLE</button>
        <button class="btn-menu" style="background: #555; color: #fff;" onclick="showScreen('screen-menu')">KEMBALI</button>
    </div>

    <script>
        let modeAktif = "";
        let faksiAktif = "";

        function showScreen(screenId, mode) {
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-select').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');

            if (mode) {
                modeAktif = mode;
                document.getElementById('mode-title').innerText = mode === 'single' ? "MODE: SINGLE PLAYER" : "MODE: MULTIPLAYER";
                
                if (mode === 'multi') {
                    document.getElementById('multiplayer-input').classList.remove('hidden');
                } else {
                    document.getElementById('multiplayer-input').classList.add('hidden');
                }
            }
        }

        function pilih(simbol, el) {
            faksiAktif = simbol;
            document.querySelectorAll('.kartu').forEach(k => k.classList.remove('terpilih'));
            el.classList.add('terpilih');
        }

        function gasMain() {
            if (!faksiAktif) {
                alert("Master! Pilih dulu simbol robot ♣ ♠ ♥ ♦!");
                return;
            }

            let kode = document.getElementById('roomCode').value || "BOT";
            
            // PINDAH KE ARENA.HTML
            window.location.href = "Arena.html?room=" + kode + "&faksi=" + faksiAktif + "&mode=" + modeAktif;
        }
    </script>
</body>
</html>
