<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLLAND: HEADLESS CURSE</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; }
        .stats { font-size: 20px; font-weight: bold; margin: 20px; color: #ffeb3b; }
        .card-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; }
        .card { 
            width: 60px; height: 90px; background: #222; border: 2px solid #f00; 
            border-radius: 5px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; color: #fff;
        }
        .card.revealed { background: #fff; color: #000; }
        .card.curse { background: #ff0000; color: #fff; animation: shake 0.5s; }
        @keyframes shake { 0% {transform: translate(1px, 1px);} 50% {transform: translate(-2px, -2px);} 100% {transform: translate(1px, 1px);} }
    </style>
</head>
<body>

    <h1>🃏 CARD GAME HOLLAND 🃏</h1>
    <div class="stats">KARTU TERPENGGAL: <span id="curseCount">0</span>/3</div>
    <p>Klik salah satu dari 10 kartu Master secara acak!</p>

    <div class="card-area" id="deck"></div>

    <script>
        let curses = 0;
        const deckElement = document.getElementById('deck');
        const symbols = ['♣', '♠', '♥', '♦', '💀']; // 💀 adalah Kepala Terpenggal

        function createDeck() {
            for (let i = 0; i < 10; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerText = '?';
                // Tentukan secara acak apakah kartu ini kutukan atau bukan (20% peluang)
                const isCurse = Math.random() < 0.2; 
                const content = isCurse ? '💀' : symbols[Math.floor(Math.random() * 4)];

                card.onclick = function() {
                    if (this.classList.contains('revealed') || curses >= 3) return;
                    
                    this.classList.add('revealed');
                    this.innerText = content;

                    if (content === '💀') {
                        this.classList.add('curse');
                        curses++;
                        document.getElementById('curseCount').innerText = curses;
                        if (curses >= 3) {
                            setTimeout(() => alert("ROBOT MASTER HANCUR! KEPALA TERPENGGAL 3 KALI!"), 100);
                        }
                    }
                };
                deckElement.appendChild(card);
            }
        }

        createDeck();
    </script>
</body>
</html>
